<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>OH o Carro do Ovo - Vendedor</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="page-vendor">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    Painel do Vendedor
                    <span class="badge" id="vendor-badge">Online</span>
                </div>

                <div style="margin-bottom: 15px;">
                    <select id="route-select" class="btn" style="width:100%; background:#222; color:#fff; text-align:left; padding:8px;">
                        <option value="rota-pelotas-centro">Rota 1: Pelotas / Centro</option>
                        <option value="rota-pelotas-zona-norte">Rota 2: Pelotas / Zona Norte</option>
                        <option value="rota-pelotas-zona-sul">Rota 3: Pelotas / Zona Sul</option>
                    </select>
                </div>
                <div class="panel-actions">
                    <button id="toggle-play-btn" class="btn">Pausar</button>
                    <button id="reset-btn" class="btn btn-secondary">Reiniciar rota</button>
                </div>

            </div>

            <div class="sidebar-content" id="vendor-clients-list">
                <div style="color: #ccc; font-size: 14px;">Carregando clientes...</div>
            </div>

            <div class="sidebar-footer">
                <button class="accordion" id="debug-accordion">Debug Técnico</button>
                <div class="accordion-panel" id="debug-panel">
                    <div style="padding-top: 16px;">
                        <div class="panel-row" id="vendor-status">Conectando ao servidor...</div>
                        <div class="panel-row" id="vendor-position">Posicao: --</div>
                        <div class="panel-row" id="vendor-step">Passo: --</div>
                        <div class="panel-row" style="margin-top:16px;">
                            <label class="log-filter">
                                Filtro:
                                <select id="log-filter">
                                    <option value="all">Todos</option>
                                    <option value="info">Info</option>
                                    <option value="warn">Warn</option>
                                    <option value="error">Erro</option>
                                </select>
                            </label>
                        </div>
                        <div class="panel-logs" id="vendor-logs"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="/js/vendor.js"></script>
    </body>
</html>
