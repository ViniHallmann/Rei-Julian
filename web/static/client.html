<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>OH o Carro do Ovo - Cliente</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="page-client">
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span id="client-name">--</span>
                </div>
            </div>

            <div class="panel-content" style="padding: 16px;">
                <div class="client-card" style="cursor: default; padding: 20px;">
                    <div class="client-card-header status-header">
                        <h3 class="status-title">Status do Vendedor</h3>
                        <div id="status" class="status-indicator">Aguardando...</div>
                        <div id="eta" class="status-eta">Chega em -- min</div>
                        
                        <div id="delay-warning" class="delay-warning" style="display: none;">
                            <svg class="icon-warning" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            O vendedor informou que vai atrasar um pouco!
                        </div>
                    </div>
                </div>

                <div class="notify-container">
                    <button id="notify-btn" class="btn btn-notify">
                        <svg class="icon-notify" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        Ativar Notificações
                    </button>
                    <div id="notify-state" class="notify-state-text">Notificações: desativadas</div>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="/js/client.js"></script>
    </body>
</html>
