<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>OH o Carro do Ovo - Início</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="page-home">
        <div class="home-card">
            <h1>OH o Carro do Ovo</h1>
            <p>Selecione uma interface para iniciar a POC</p>

            <div class="group-title">Painel de Operação</div>
            <a href="/vendor.html" class="btn" style="text-decoration: none; margin-bottom: 0;">
                Painel do Vendedor
            </a>

            <div class="group-title">Visualização do Cliente</div>
            <select id="client-select" class="select-custom">
                <option value="cliente-1">Maria (Mercado Público)</option>
                <option value="cliente-2">João (Calçadão)</option>
                <option value="cliente-3">Ana (Terminal)</option>
                <option value="cliente-4">Carlos (Av. Dom Joaquim)</option>
                <option value="cliente-5">Fernanda (Fernando Osório)</option>
                <option value="cliente-6">Pedro (Una)</option>
                <option value="cliente-7">Lucas (Shopping)</option>
            </select>
            
            <button id="btn-go-client" class="btn btn-secondary" style="width: 100%;">
                Acessar Tela do Cliente
            </button>
        </div>

        <script>
            document.getElementById('btn-go-client').addEventListener('click', () => {
                const clientId = document.getElementById('client-select').value;
                window.location.href = `/client/${clientId}`;
            });
        </script>
    </body>
</html>
