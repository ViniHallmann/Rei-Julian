<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>OH o Carro do Ovo</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/css/style.css">
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: #111;
            }
            .home {
                background: #1a1a1a;
                color: #fff;
                padding: 32px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                text-align: center;
                max-width: 400px;
                border: 1px solid #333;
            }
            .home a {
                display: block;
                margin-top: 12px;
                color: #000;
                background: #00e676;
                padding: 12px 16px;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                transition: all 0.2s;
            }
            .home a:hover {
                background: #00c853;
                transform: translateY(-2px);
            }
            .home h1 { margin-top: 0; }
            .home p { color: #ccc; margin-bottom: 24px; }
        </style>
    </head>
    <body>
        <div class="home">
            <h1>OH o Carro do Ovo</h1>
            <p>Escolha uma tela para iniciar a POC.</p>
            <a href="/vendor.html">Painel do Vendedor</a>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #333;">
            <p style="font-size: 14px; color: #888; margin-bottom: 12px;">Telas de Clientes Fixos:</p>
            <a href="/client/cliente-1">Cliente: Maria</a>
            <a href="/client/cliente-2">Cliente: João</a>
            <a href="/client/cliente-3">Cliente: Ana</a>
        </div>
    </body>
</html>
